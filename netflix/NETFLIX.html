<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NETFLIX</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    .card img {
      height: 250px;
      object-fit: cover;
    }


    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .card-hover:hover {
      transform: scale(1.08);
      z-index: 10;
      box-shadow: 0 15px 30px rgba(0,0,0,0.8);
    }

    .card-hover img {
      transition: transform 0.3s ease;
    }

    .card-hover:hover img {
      transform: scale(1.1);
    }

   
    .row {
      overflow: visible;
    }
  </style>
</head>

<body class="bg-black">

<div class="position-relative">

  <nav class="navbar navbar-dark position-absolute top-0 start-0 w-100 px-4" style="z-index: 10;">
    <a class="navbar-brand text-danger fw-bold fs-3">NETFLIX</a>
    <a class="btn btn-danger ms-auto">Sign In</a>
  </nav>

 
  <img src="./assest/the_netflix_login_background__canada__2024___by_logofeveryt_dh0w8qv.jpg"
       class="w-100 vh-100 object-fit-cover">

  <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"></div>


  <div class="position-absolute top-50 start-50 translate-middle text-center text-white px-3"
       style="z-index: 10; max-width: 700px;">
    
    <h1 class="fw-bold display-4">Unlimited movies, shows, and more</h1>
    <h2 class="fs-5 mt-3">Starts at ₹149. Cancel at any time.</h2>

    <h6 class="mt-4">
      Ready to watch? Enter your email to create or restart your membership.
    </h6>

    <div class="d-flex flex-column flex-md-row gap-2 mt-3">
      <input class="form-control form-control-lg" type="email" placeholder="Email address">
      <button class="btn btn-danger btn-lg">Get Started ></button>
    </div>

  </div>
</div>

        </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
