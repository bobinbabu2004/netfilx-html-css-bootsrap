<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETFLIX</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<div class="position-relative">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark position-absolute top-0 start-0 w-100 px-4" style="z-index: 10;">
    <a class="navbar-brand text-danger fw-bold fs-3" href="#">NETFLIX</a>

    <div class="ms-auto">
      <a class="btn btn-danger" href="#">Sign In</a>
    </div>
  </nav>

  <!-- IMAGE -->
  <img 
    src="./assest/the_netflix_login_background__canada__2024___by_logofeveryt_dh0w8qv.jpg" 
    class="w-100 vh-100 object-fit-cover">

  <!-- DARK OVERLAY -->
  <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50"></div>

  <!-- TEXT -->
  <div class="position-absolute top-50 start-50 translate-middle text-center text-white px-3" style="z-index: 10; max-width: 700px;">
    
    <h1 class="fw-bold display-4">Unlimited movies, shows, and more</h1>
    
    <h2 class="fs-5 mt-3">Starts at ₹149. Cancel at any time.</h2>
    
    <h6 class="mt-4">
      Ready to watch? Enter your email to create or restart your membership.
    </h6>

    <!-- INPUT + BUTTON -->
    <div class="d-flex flex-column flex-md-row gap-2 mt-3">
      <input 
        class="form-control form-control-lg" 
        type="email" 
        placeholder="Email address">

      <button class="btn btn-danger btn-lg">
        Get Started >
      </button>
    </div>

  </div>

</div>

</body>
</html>
